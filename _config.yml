# GitHub Pages Configuration for radicalkjax.com

# Site settings
title: KALI JACKSON (@RADICALKJAX)
description: Personal website and blog of Kali Jackson, software engineer, security researcher, and AI researcher.
url: "https://radicalkjax.com"
baseurl: ""

# Build settings
markdown: kramdown
# Theme is provided by GitHub Pages, don't specify here
# theme: jekyll-theme-minimal
plugins:
  - jekyll-feed
  - jekyll-seo-tag


# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md
  - docs
  - package-lock.json
  - .eslintrc.json
  - .prettierrc.json

# Front-matter defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      rich_content: true   # load MathJax/Mermaid/key-terms/print assets only on posts

# Custom settings
author:
  name: Kali Jackson
  email: contact@radicalkjax.com
  twitter: radicalkjax
  github: radicalkjax
